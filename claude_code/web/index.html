<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Python - Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff@5.1.0/dist/diff.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="gradient-bg min-h-screen text-slate-100">
    <div class="flex flex-col h-screen mx-auto p-4 md:p-6">
        <!-- Header -->
        <header class="flex items-center justify-between mb-4 fade-in">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-semibold text-white">Claude Code Python</h1>
                    <p class="text-xs text-slate-400">AI Programming Assistant</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span id="token-count" class="text-xs text-slate-400 hidden">
                    <span class="text-slate-500">Tokens:</span>
                    <span id="token-used" class="text-blue-400">0</span>
                    <span class="text-slate-600">/</span>
                    <span id="token-total" class="text-slate-500">128000</span>
                </span>
                <button id="sessions-btn" class="p-2 rounded-lg hover:bg-slate-700/50 transition-colors" title="会话列表">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                </button>
                <button id="new-session-btn" class="p-2 rounded-lg hover:bg-slate-700/50 transition-colors" title="新会话">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                </button>
                <span id="status" class="flex items-center gap-2 text-sm text-slate-400">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                    就绪
                </span>
            </div>
        </header>

        <!-- Chat Container -->
        <div class="flex-1 overflow-hidden flex flex-col glass rounded-2xl shadow-2xl">
            <!-- Messages Area -->
            <div id="messages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4">
                <!-- Welcome Message -->
                <div class="text-center py-12" id="welcome-message">
                    <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-blue-500/20 to-indigo-600/20 flex items-center justify-center">
                        <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                        </svg>
                    </div>
                    <h2 class="text-lg font-medium text-white mb-2">开始对话</h2>
                    <p class="text-slate-400 text-sm max-w-md mx-auto">我可以帮你编写代码、调试问题、解释概念。有什么需要协助的吗？</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 md:p-6 border-t border-slate-700/50 bg-slate-900/50">
                <form id="chat-form" class="flex gap-3">
                    <div class="flex-1 relative">
                        <textarea 
                            id="message-input" 
                            rows="1" 
                            placeholder="输入消息... (Shift+Enter 换行, ↑↓ 历史)"
                            class="w-full bg-slate-800/80 border border-slate-700 rounded-xl px-4 py-3 pr-12 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 input-glow resize-none transition-all duration-200"
                            style="max-height: 200px;"
                        ></textarea>
                    </div>
                    <button 
                        type="submit" 
                        id="send-btn"
                        class="px-6 py-3 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-medium rounded-xl shadow-lg shadow-blue-500/30 transition-all duration-200 hover:shadow-blue-500/50 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Sessions Modal -->
    <div id="sessions-modal" class="fixed inset-0 hidden items-center justify-center z-50">
        <div class="modal-overlay absolute inset-0" onclick="closeSessionsModal()"></div>
        <div class="relative glass rounded-2xl shadow-2xl w-full max-w-md mx-4 max-h-[80vh] overflow-hidden">
            <div class="flex items-center justify-between p-4 border-b border-slate-700/50">
                <h2 class="text-lg font-semibold text-white">会话列表</h2>
                <button onclick="closeSessionsModal()" class="p-1 rounded-lg hover:bg-slate-700/50">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="sessions-list" class="overflow-y-auto max-h-[60vh]">
                <!-- Sessions will be loaded here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
