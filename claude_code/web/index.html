<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Python - Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff@5.1.0/dist/diff.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        html {
            font-size: 14px;
        }
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        code, pre, .mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }
        pre code {
            font-size: 12px;
        }
        .markdown-body pre {
            font-size: 12px;
        }
        .markdown-body code {
            font-size: 12px;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .message-user {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        .message-assistant {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        .tool-block {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(55, 65, 81, 0.5);
            overflow: hidden;
            min-width: 0;
        }
        .tool-block pre {
            max-width: 100%;
            overflow-x: auto;
        }
        .collapsible-header {
            cursor: pointer;
            user-select: none;
        }
        .collapsible-header:hover {
            background: rgba(71, 85, 105, 0.3);
        }
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .collapsible-content.expanded {
            max-height: 5000px;
            overflow: visible;
        }
        .collapse-icon {
            transition: transform 0.2s ease;
        }
        .collapse-icon.rotated {
            transform: rotate(90deg);
        }
        .message-assistant {
            overflow: hidden;
        }
        .assistant-content {
            overflow-x: auto;
        }
        .assistant-content pre {
            max-width: 100%;
            overflow-x: auto;
        }
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }
        .typing-indicator span {
            animation: blink 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.8);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 0.9);
        }
        .markdown-body {
            color: #e2e8f0;
            line-height: 1.6;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: #f8fafc;
            margin-top: 1em;
            margin-bottom: 0.5em;
            font-weight: 600;
        }
        .markdown-body h1 { font-size: 1.5em; }
        .markdown-body h2 { font-size: 1.25em; }
        .markdown-body h3 { font-size: 1.1em; }
        .markdown-body p { margin: 0.5em 0; }
        .markdown-body code {
            background: rgba(15, 23, 42, 0.8);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .markdown-body pre {
            background: rgba(15, 23, 42, 0.9);
            padding: 1em;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.5em 0;
        }
        .markdown-body pre code {
            background: transparent;
            padding: 0;
        }
        .markdown-body ul, .markdown-body ol {
            margin: 0.5em 0;
            padding-left: 1.5em;
        }
        .markdown-body li { margin: 0.25em 0; }
        .markdown-body blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 1em;
            margin: 0.5em 0;
            color: #94a3b8;
        }
        .markdown-body a {
            color: #60a5fa;
            text-decoration: underline;
        }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 0.5em 0;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #334155;
            padding: 0.5em;
        }
        .markdown-body th {
            background: rgba(30, 41, 59, 0.8);
        }
        .file-expansion {
            background: rgba(30, 64, 175, 0.3);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .d2h-wrapper {
            background: transparent !important;
        }
        .d2h-file-header {
            background: transparent !important;
            padding: 4px 8px !important;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3) !important;
        }
        .d2h-info {
            background: transparent !important;
            border: none !important;
        }
        .d2h-info td {
            border: none !important;
        }
        .d2h-file-name {
            color: #e2e8f0 !important;
            font-size: 12px !important;
        }
        .d2h-diff-table {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 12px !important;
            border: none !important;
            line-height: 1.4 !important;
            width: 100% !important;
        }
        .d2h-diff-table colgroup col {
            width: auto !important;
        }
        .d2h-diff-table td, .d2h-diff-table th {
            border: none !important;
            padding: 0 4px !important;
        }
        .d2h-code-line, .d2h-code-side-empty {
            border: none !important;
            line-height: 1.4 !important;
            background: transparent !important;
        }
        .d2h-code-line-ctn {
            color: #e2e8f0 !important;
            border: none !important;
            padding: 0 4px !important;
            line-height: 1.4 !important;
            background: transparent !important;
        }
        .d2h-ins {
            background: rgba(34, 197, 94, 0.15) !important;
        }
        .d2h-ins td,
        .d2h-ins .d2h-code-line-ctn,
        .d2h-ins span,
        .d2h-ins del,
        .d2h-ins ins {
            background: transparent !important;
        }
        .d2h-del {
            background: rgba(239, 68, 68, 0.15) !important;
        }
        .d2h-del td,
        .d2h-del .d2h-code-line-ctn,
        .d2h-del span,
        .d2h-del del,
        .d2h-del ins {
            background: transparent !important;
        }
        .d2h-code-side-empty,
        .d2h-empty-placeholder,
        .d2h-code-side-empty td,
        .d2h-empty-placeholder td,
        .d2h-code-side-empty .d2h-code-line-ctn,
        .d2h-empty-placeholder .d2h-code-line-ctn {
            background: transparent !important;
        }
        .d2h-cntx,
        .d2h-cntx td,
        .d2h-cntx .d2h-code-line-ctn,
        .d2h-cntx .d2h-line-num {
            background: transparent !important;
        }
        .d2h-code-line del, .d2h-code-line ins,
        .d2h-ins del, .d2h-del ins,
        .d2h-ins ins, .d2h-del del,
        .d2h-ins span, .d2h-del span {
            background: transparent !important;
            color: #e2e8f0 !important;
            text-decoration: none !important;
            border-radius: 0 !important;
            padding: 0 !important;
        }
        .d2h-change {
            background: transparent !important;
        }
        .d2h-info-line {
            background: transparent !important;
        }
        .d2h-moved {
            background: transparent !important;
        }
        .d2h-moved .d2h-code-line-ctn {
            background: transparent !important;
        }
        .d2h-off,
        .d2h-off td,
        .d2h-off .d2h-line-num,
        .d2h-off .d2h-code-line-ctn {
            background: transparent !important;
        }
        .d2h-info {
            background: transparent !important;
        }
        .d2h-info td {
            background: transparent !important;
        }
        .diff-container td,
        .diff-container th,
        .diff-container tr,
        .diff-container div,
        .diff-container span {
            background-color: transparent !important;
        }
        .diff-container .d2h-ins {
            background-color: rgba(34, 197, 94, 0.15) !important;
        }
        .diff-container .d2h-del {
            background-color: rgba(239, 68, 68, 0.15) !important;
        }
        .d2h-line-num {
            color: #64748b !important;
            background: transparent !important;
            border: none !important;
            padding: 0 6px !important;
            line-height: 1.4 !important;
            min-width: 32px !important;
        }
        .d2h-cntx {
            background: transparent !important;
        }
        .d2h-cntx .d2h-code-line-ctn {
            background: transparent !important;
        }
        .d2h-tag {
            background: transparent !important;
            color: #64748b !important;
        }
        .diff-container .hljs {
            background: transparent !important;
        }
        .diff-container .hljs-addition {
            background: transparent !important;
        }
        .diff-container .hljs-deletion {
            background: transparent !important;
        }
        .diff-container span[style*="background"] {
            background: transparent !important;
        }
        .diff-container .d2h-code-line-ctn * {
            background: transparent !important;
        }
        .diff-container .d2h-ins *,
        .diff-container .d2h-del * {
            background: transparent !important;
        }
        .diff-container del,
        .diff-container ins {
            background: transparent !important;
            background-color: transparent !important;
            text-decoration: none !important;
            color: #e2e8f0 !important;
        }
        .diff-container {
            border-radius: 6px;
            overflow: auto;
            border: 1px solid rgba(71, 85, 105, 0.4);
            background: transparent !important;
            max-width: 100%;
        }
        .diff-container .d2h-wrapper {
            margin: 0 !important;
        }
        .d2h-file-wrapper {
            border: none !important;
            margin: 0 !important;
        }
        .diff-container table {
            border-collapse: collapse !important;
        }
        .diff-container td, .diff-container th {
            border: none !important;
            box-shadow: none !important;
        }
        .d2h-file-list-wrapper {
            display: none !important;
        }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }
        .session-item:hover {
            background: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-slate-100">
    <div class="flex flex-col h-screen mx-auto p-4 md:p-6">
        <!-- Header -->
        <header class="flex items-center justify-between mb-4 fade-in">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-semibold text-white">Claude Code Python</h1>
                    <p class="text-xs text-slate-400">AI Programming Assistant</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span id="token-count" class="text-xs text-slate-400 hidden">
                    <span class="text-slate-500">Tokens:</span>
                    <span id="token-used" class="text-blue-400">0</span>
                    <span class="text-slate-600">/</span>
                    <span id="token-total" class="text-slate-500">128000</span>
                </span>
                <button id="sessions-btn" class="p-2 rounded-lg hover:bg-slate-700/50 transition-colors" title="会话列表">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                </button>
                <button id="new-session-btn" class="p-2 rounded-lg hover:bg-slate-700/50 transition-colors" title="新会话">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                </button>
                <span id="status" class="flex items-center gap-2 text-sm text-slate-400">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                    就绪
                </span>
            </div>
        </header>

        <!-- Chat Container -->
        <div class="flex-1 overflow-hidden flex flex-col glass rounded-2xl shadow-2xl">
            <!-- Messages Area -->
            <div id="messages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4">
                <!-- Welcome Message -->
                <div class="text-center py-12" id="welcome-message">
                    <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-blue-500/20 to-indigo-600/20 flex items-center justify-center">
                        <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                        </svg>
                    </div>
                    <h2 class="text-lg font-medium text-white mb-2">开始对话</h2>
                    <p class="text-slate-400 text-sm max-w-md mx-auto">我可以帮你编写代码、调试问题、解释概念。有什么需要协助的吗？</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 md:p-6 border-t border-slate-700/50 bg-slate-900/50">
                <form id="chat-form" class="flex gap-3">
                    <div class="flex-1 relative">
                        <textarea 
                            id="message-input" 
                            rows="1" 
                            placeholder="输入消息... (Shift+Enter 换行, ↑↓ 历史)"
                            class="w-full bg-slate-800/80 border border-slate-700 rounded-xl px-4 py-3 pr-12 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 input-glow resize-none transition-all duration-200"
                            style="max-height: 200px;"
                        ></textarea>
                    </div>
                    <button 
                        type="submit" 
                        id="send-btn"
                        class="px-6 py-3 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-medium rounded-xl shadow-lg shadow-blue-500/30 transition-all duration-200 hover:shadow-blue-500/50 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Sessions Modal -->
    <div id="sessions-modal" class="fixed inset-0 hidden items-center justify-center z-50">
        <div class="modal-overlay absolute inset-0" onclick="closeSessionsModal()"></div>
        <div class="relative glass rounded-2xl shadow-2xl w-full max-w-md mx-4 max-h-[80vh] overflow-hidden">
            <div class="flex items-center justify-between p-4 border-b border-slate-700/50">
                <h2 class="text-lg font-semibold text-white">会话列表</h2>
                <button onclick="closeSessionsModal()" class="p-1 rounded-lg hover:bg-slate-700/50">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="sessions-list" class="overflow-y-auto max-h-[60vh]">
                <!-- Sessions will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        let sessionId = null;
        let isLoading = false;
        let currentAssistantMessage = null;
        let inputHistory = JSON.parse(localStorage.getItem('inputHistory') || '[]');
        let historyIndex = -1;
        let accumulatedText = '';
        let pendingToolUses = {}; // Track tool uses by ID

        const messagesContainer = document.getElementById('messages');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const statusIndicator = document.getElementById('status');
        const welcomeMessage = document.getElementById('welcome-message');
        const sessionsBtn = document.getElementById('sessions-btn');
        const newSessionBtn = document.getElementById('new-session-btn');
        const sessionsModal = document.getElementById('sessions-modal');
        const sessionsList = document.getElementById('sessions-list');
        const tokenCountEl = document.getElementById('token-count');
        const tokenUsedEl = document.getElementById('token-used');

        // Configure marked
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // Handle input history navigation
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            } else if (e.key === 'ArrowUp' && !e.shiftKey) {
                e.preventDefault();
                navigateHistory(-1);
            } else if (e.key === 'ArrowDown' && !e.shiftKey) {
                e.preventDefault();
                navigateHistory(1);
            }
        });

        function navigateHistory(direction) {
            if (inputHistory.length === 0) return;
            
            historyIndex += direction;
            
            if (historyIndex < 0) {
                historyIndex = 0;
            } else if (historyIndex >= inputHistory.length) {
                historyIndex = inputHistory.length;
                messageInput.value = '';
                messageInput.style.height = 'auto';
                return;
            }
            
            messageInput.value = inputHistory[historyIndex] || '';
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
        }

        function addToHistory(text) {
            if (text.trim() && (inputHistory.length === 0 || inputHistory[inputHistory.length - 1] !== text)) {
                inputHistory.push(text);
                if (inputHistory.length > 100) {
                    inputHistory.shift();
                }
                localStorage.setItem('inputHistory', JSON.stringify(inputHistory));
            }
            historyIndex = inputHistory.length;
        }

        function setStatus(text, color = 'emerald') {
            statusIndicator.innerHTML = `
                <span class="w-2 h-2 rounded-full bg-${color}-500"></span>
                ${text}
            `;
        }

        function updateTokenCount(used) {
            if (used > 0) {
                tokenCountEl.classList.remove('hidden');
                tokenUsedEl.textContent = used.toLocaleString();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            return marked.parse(text);
        }

        function isDiffContent(content) {
            return content.includes('---') && content.includes('+++') || 
                   content.includes('diff --git') ||
                   (content.includes('-') && content.includes('+') && content.includes('@@'));
        }

        function generateDiff(oldContent, newContent, filePath) {
            const oldLines = oldContent.split('\n');
            const newLines = newContent.split('\n');
            
            let diff = `diff --git a/${filePath} b/${filePath}\n`;
            diff += `--- a/${filePath}\n`;
            diff += `+++ b/${filePath}\n`;
            
            const diffResult = Diff.diffLines(oldContent, newContent);
            
            for (const part of diffResult) {
                const lines = part.value.split('\n');
                if (lines[lines.length - 1] === '') {
                    lines.pop();
                }
                
                for (const line of lines) {
                    if (part.added) {
                        diff += `+${line}\n`;
                    } else if (part.removed) {
                        diff += `-${line}\n`;
                    } else {
                        diff += ` ${line}\n`;
                    }
                }
            }
            
            return diff;
        }

        function renderDiff(content, containerId) {
            const container = document.createElement('div');
            container.className = 'diff-container my-2';
            const innerDiv = document.createElement('div');
            innerDiv.id = containerId;
            container.appendChild(innerDiv);
            
            try {
                const configuration = {
                    drawFileList: false,
                    matching: 'lines',
                    outputFormat: 'side-by-side',
                    highlight: true,
                    synchronisedScroll: true,
                    colorScheme: 'dark'
                };
                const diff2htmlUi = new Diff2HtmlUI(innerDiv, content, configuration);
                diff2htmlUi.draw();
                diff2htmlUi.highlightCode();
                return container.outerHTML;
            } catch (e) {
                console.error('Diff render error:', e);
                return `<pre class="mono text-xs text-slate-300 bg-slate-900/50 rounded p-2 overflow-x-auto whitespace-pre-wrap">${escapeHtml(content)}</pre>`;
            }
        }
        
        let diffCounter = 0;

        function renderToolResultWithDiff(toolName, toolInput, result) {
            if (toolName === 'Edit' || toolName === 'edit') {
                const oldString = toolInput.old_string || '';
                const newString = toolInput.new_string || '';
                const filePath = toolInput.file_path || 'file';
                
                if (oldString && newString) {
                    const diff = generateDiff(oldString, newString, filePath);
                    const containerId = `diff-container-${++diffCounter}`;
                    return renderDiff(diff, containerId);
                }
            } else if (toolName === 'Write' || toolName === 'write') {
                const content = toolInput.content || '';
                const filePath = toolInput.file_path || 'file';
                
                if (content) {
                    const diff = generateDiff('', content, filePath);
                    const containerId = `diff-container-${++diffCounter}`;
                    return renderDiff(diff, containerId);
                }
            }
            
            // Default: render as pre-formatted text
            return `<pre class="mono text-xs text-slate-300 bg-slate-900/50 rounded p-2 overflow-x-auto whitespace-pre-wrap">${escapeHtml(result)}</pre>`;
        }
        
        function isFileEditTool(toolName) {
            const normalized = (toolName || '').toLowerCase();
            return normalized === 'edit' || normalized === 'write';
        }
        
        function summarizeToolUse(toolName, toolInput) {
            if (!toolInput) return toolName;
            if (toolInput.command) {
                const cmd = toolInput.command;
                return `${toolName}: ${cmd.length > 50 ? cmd.substring(0, 47) + '...' : cmd}`;
            }
            if (toolInput.file_path) {
                const path = toolInput.file_path;
                const name = path.split('/').pop() || path;
                return `${toolName}: ${name}`;
            }
            if (toolInput.pattern) {
                const pat = toolInput.pattern;
                return `${toolName}: ${pat.length > 50 ? pat.substring(0, 47) + '...' : pat}`;
            }
            const keys = Object.keys(toolInput);
            if (keys.length > 0) {
                const preview = keys.slice(0, 3).join(', ');
                return `${toolName}: ${preview}${keys.length > 3 ? ', ...' : ''}`;
            }
            return toolName;
        }
        
        function summarizeToolResult(toolName, toolInput, result, isError) {
            const lines = (result || '').split('\n').filter(l => l.trim());
            const firstLine = lines[0] || '';
            
            function getBasename() {
                const fp = toolInput?.file_path || '';
                return fp.split('/').pop() || 'file';
            }
            
            function getPattern() {
                const pat = toolInput?.pattern || '';
                return pat ? `'${pat}'` : '';
            }
            
            if (isError) {
                if (toolName === 'Bash') {
                    const cmd = toolInput?.command || '';
                    return `Failed to run ${cmd.length > 40 ? cmd.substring(0, 37) + '...' : cmd}`;
                }
                if (['Read', 'Write', 'Edit'].includes(toolName)) {
                    return `Failed to ${toolName.toLowerCase()} ${getBasename()}`;
                }
                if (['Glob', 'Grep'].includes(toolName)) {
                    return `Failed to search ${getPattern()}`;
                }
                return `Failed to run ${toolName}`;
            }
            
            if (toolName === 'Read') {
                const match = result?.match(/Lines:\s*(\d+)-(\d+)\s+of\s+(\d+)/);
                if (match) {
                    const [, start, end, total] = match;
                    const count = parseInt(end) - parseInt(start) + 1;
                    return `Read ${count} line${count > 1 ? 's' : ''} from ${getBasename()} (${start}-${end} of ${total})`;
                }
                return `Read ${getBasename()}`;
            }
            
            if (toolName === 'Glob') {
                const pat = getPattern();
                if (firstLine.includes('No files found')) {
                    return `Glob found no files matching ${pat}`;
                }
                if (firstLine.startsWith('Found ')) {
                    return `Glob ${firstLine.charAt(0).toLowerCase()}${firstLine.slice(1)}`;
                }
                return `Glob results matching ${pat}`;
            }
            
            if (toolName === 'Grep') {
                const pat = getPattern();
                if (firstLine === 'No matches found' || firstLine === 'No files found') {
                    return `Grep found no matches for ${pat}`;
                }
                if (firstLine.startsWith('Found ')) {
                    return `Grep ${firstLine.charAt(0).toLowerCase()}${firstLine.slice(1)}${pat ? ` matching ${pat}` : ''}`;
                }
                return `Grep matches for ${pat}`;
            }
            
            if (toolName === 'Write' || toolName === 'Edit') {
                return firstLine || `${toolName} completed`;
            }
            
            if (toolName === 'Bash') {
                const cmd = toolInput?.command || '';
                return `Ran: ${cmd.length > 40 ? cmd.substring(0, 37) + '...' : cmd}`;
            }
            
            return firstLine || `${toolName} completed`;
        }
        
        function createToolUseBlock(toolName, toolInput, toolUseId, collapseId) {
            const summary = summarizeToolUse(toolName, toolInput);
            const shouldExpand = isFileEditTool(toolName);
            const expandedClass = shouldExpand ? 'expanded' : '';
            const iconClass = shouldExpand ? 'rotated' : '';
            
            let inputDetails = '';
            const excludeKeys = isFileEditTool(toolName) ? 
                (toolName.toLowerCase() === 'edit' ? ['old_string', 'new_string'] : ['content']) : [];
            
            for (const [key, value] of Object.entries(toolInput || {})) {
                if (excludeKeys.includes(key)) continue;
                let displayValue;
                if (typeof value === 'object') {
                    displayValue = JSON.stringify(value, null, 2);
                } else {
                    displayValue = String(value);
                }
                if (displayValue.length > 100) {
                    displayValue = displayValue.substring(0, 97) + '...';
                }
                inputDetails += `<div class="text-xs text-slate-400"><span class="text-slate-500">${escapeHtml(key)}:</span> ${escapeHtml(displayValue.split('\n')[0])}</div>`;
            }
            
            return `
                <div class="tool-block rounded-lg p-3 my-2 border-l-4 border-blue-500" data-tool-use-id="${toolUseId}">
                    <div class="collapsible-header flex items-center justify-between rounded -m-3 p-3" onclick="toggleCollapse('${collapseId}')">
                        <div class="text-sm font-medium text-blue-400 tool-summary">
                            ${escapeHtml(summary)}
                        </div>
                        <svg class="w-4 h-4 text-slate-400 collapse-icon ${iconClass}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </div>
                    <div id="${collapseId}" class="collapsible-content ${expandedClass}">
                        <div class="mt-2">
                            ${inputDetails}
                            <div class="tool-result-area mt-2"></div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function updateToolResult(toolUseId, toolName, toolInput, result, isError) {
            const toolBlock = document.querySelector(`[data-tool-use-id="${toolUseId}"]`);
            if (!toolBlock) return;
            
            const summaryEl = toolBlock.querySelector('.tool-summary');
            const resultArea = toolBlock.querySelector('.tool-result-area');
            
            if (summaryEl) {
                const summary = summarizeToolResult(toolName, toolInput, result, isError);
                const statusColor = isError ? 'text-red-400' : 'text-emerald-400';
                const statusIcon = isError ? '✗' : '●';
                summaryEl.className = `text-sm font-medium ${statusColor} tool-summary`;
                summaryEl.innerHTML = `${statusIcon} ${escapeHtml(summary)}`;
            }
            
            if (resultArea) {
                if (isFileEditTool(toolName) && !isError) {
                    resultArea.innerHTML = renderToolResultWithDiff(toolName, toolInput, result);
                } else {
                    const lines = result.split('\n').filter(l => l.trim());
                    const preview = lines.slice(0, 6).join('\n');
                    const hasMore = lines.length > 6;
                    resultArea.innerHTML = `<pre class="mono text-xs text-slate-300 bg-slate-900/50 rounded p-2 overflow-x-auto whitespace-pre-wrap">${escapeHtml(preview)}${hasMore ? '\n...' : ''}</pre>`;
                }
            }
            
            // Update border color
            toolBlock.classList.remove('border-blue-500');
            toolBlock.classList.add(isError ? 'border-red-500' : 'border-emerald-500');
        }
        
        let toolUseCounter = 0;
        let collapseCounter = 0;

            const el = document.getElementById(id);

        async function loadSessions() {
            try {

                    sessionsList.innerHTML = `

                }
                
                sessionsList.innerHTML = data.sessions.map(sess => `
                    <div class="session-item p-4 border-b border-slate-700/50 cursor-pointer transition-colors" onclick="loadSession('${sess.session_id}')">
                        <div class="flex items-center justify-between">

                                <h3 class="text-white font-medium truncate">${escapeHtml(sess.title || 'Untitled')}</h3>

            } catch (error) {
                console.error('Failed to load sessions:', error);
                sessionsList.innerHTML = `
                    <div class="p-4 text-center text-red-400 text-sm">
                        加载失败: ${escapeHtml(error.message)}
                    </div>
                `;
            }
        }

        async function loadSession(sessionIdToLoad) {
            try {
                closeSessionsModal();
                clearChat();
                
                const response = await fetch(`/api/sessions/${sessionIdToLoad}`);
                const data = await response.json();
                
                if (data.error) {
                    alert('加载会话失败: ' + data.error);
                    return;
                }
                
                sessionId = sessionIdToLoad;
                
                // Load messages
                if (data.messages && data.messages.length > 0) {
                    welcomeMessage.classList.add('hidden');
                    
                    let lastAssistantMsg = null;
                    let lastAssistantContentEl = null;
                    let sessionToolUses = {}; // Track tool uses for this session
                    
                    for (const msg of data.messages) {
                        if (msg.role === 'user') {
                            const fileExpansions = msg.file_expansions || [];
                            const originalText = msg.original_text || '';
                            let displayText = '';
                            
                            if (msg.content_blocks) {
                                for (const block of msg.content_blocks) {
                                    if (block.type === 'text') {
                                        displayText = block.text;
                                        break;
                                    }
                                }
                            } else {
                                displayText = msg.content || '';
                            }
                            
                            messagesContainer.appendChild(createUserMessage(originalText || displayText, fileExpansions));
                            lastAssistantMsg = null;
                            lastAssistantContentEl = null;
                            sessionToolUses = {};
                            
                        } else if (msg.role === 'assistant') {
                            const assistantMsg = createAssistantMessage();
                            const contentEl = assistantMsg.querySelector('.assistant-content');
                            lastAssistantMsg = assistantMsg;
                            lastAssistantContentEl = contentEl;
                            
                            if (msg.content_blocks && msg.content_blocks.length > 0) {
                                for (const block of msg.content_blocks) {
                                    if (block.type === 'text') {
                                        contentEl.innerHTML += renderMarkdown(block.text);
                                    } else if (block.type === 'thinking') {
                                        contentEl.innerHTML += `<span class="text-slate-500 italic">${escapeHtml(block.thinking)}</span>`;
                                    } else if (block.type === 'tool_use') {
                                        // Save tool use info
                                        sessionToolUses[block.tool_use_id] = {
                                            tool_name: block.tool_name,
                                            input: block.input
                                        };
                                        
                                        const collapseId = `tool-collapse-${++toolUseCounter}`;
                                        contentEl.innerHTML += createToolUseBlock(block.tool_name, block.input, block.tool_use_id, collapseId);
                                    } else if (block.type === 'tool_result') {
                                        const toolInfo = sessionToolUses[block.tool_use_id];
                                        
                                        if (toolInfo) {
                                            updateToolResult(block.tool_use_id, toolInfo.tool_name, toolInfo.input, block.result, block.is_error);
                                            delete sessionToolUses[block.tool_use_id];
                                        } else {
                                            // Fallback: standalone result block
                                            const lines = (block.result || '').split('\n').filter(l => l.trim());
                                            const preview = lines.slice(0, 6).join('\n');
                                            const hasMore = lines.length > 6;
                                            contentEl.innerHTML += `
                                                <div class="tool-block rounded-lg p-3 my-2 border-l-4 ${block.is_error ? 'border-red-500' : 'border-emerald-500'}">
                                                    <div class="text-sm font-medium ${block.is_error ? 'text-red-400' : 'text-emerald-400'} mb-1">
                                                        ${block.is_error ? '✗' : '●'} Result
                                                    </div>
                                                    <pre class="mono text-xs text-slate-300 bg-slate-900/50 rounded p-2 overflow-x-auto whitespace-pre-wrap">${escapeHtml(preview)}${hasMore ? '\n...' : ''}</pre>
                                                </div>
                                            `;
                                        }
                                    }
                                }
                            } else {
                                contentEl.innerHTML = renderMarkdown(msg.content || '');
                            }
                            
                            messagesContainer.appendChild(assistantMsg);
                            
                        } else if (msg.role === 'tool') {
                            // Tool result messages - append to last assistant message
                            if (msg.content_blocks) {
                                for (const block of msg.content_blocks) {
                                    if (block.type === 'tool_result') {
                                        let targetContentEl = lastAssistantContentEl;
                                        
                                        // If no assistant message exists, create one
                                        if (!targetContentEl) {
                                            const assistantMsg = createAssistantMessage();
                                            messagesContainer.appendChild(assistantMsg);
                                            targetContentEl = assistantMsg.querySelector('.assistant-content');
                                            lastAssistantMsg = assistantMsg;
                                            lastAssistantContentEl = targetContentEl;
                                        }
                                        
                                        const toolInfo = sessionToolUses[block.tool_use_id];
                                        
                                        if (toolInfo) {
                                            updateToolResult(block.tool_use_id, toolInfo.tool_name, toolInfo.input, block.result, block.is_error);
                                            delete sessionToolUses[block.tool_use_id];
                                        } else {
                                            // Fallback: standalone result block
                                            const lines = (block.result || '').split('\n').filter(l => l.trim());
                                            const preview = lines.slice(0, 6).join('\n');
                                            const hasMore = lines.length > 6;
                                            targetContentEl.innerHTML += `
                                                <div class="tool-block rounded-lg p-3 my-2 border-l-4 ${block.is_error ? 'border-red-500' : 'border-emerald-500'}">
                                                    <div class="text-sm font-medium ${block.is_error ? 'text-red-400' : 'text-emerald-400'} mb-1">
                                                        ${block.is_error ? '✗' : '●'} Result
                                                    </div>
                                                    <pre class="mono text-xs text-slate-300 bg-slate-900/50 rounded p-2 overflow-x-auto whitespace-pre-wrap">${escapeHtml(preview)}${hasMore ? '\n...' : ''}</pre>
                                                </div>
                                            `;
                                        }
                                    }
                                }
                            }
                        }
                    }
                    scrollToBottom();
                }
                
                // Update token count if available
                if (data.total_usage) {
                    updateTokenCount(data.total_usage.input_tokens + data.total_usage.output_tokens);
                }
            } catch (error) {
                console.error('Failed to load session:', error);
                alert('加载会话失败: ' + error.message);
            }
        }

        function openSessionsModal() {
            sessionsModal.classList.remove('hidden');
            sessionsModal.classList.add('flex');
            loadSessions();
        }

        function closeSessionsModal() {
            sessionsModal.classList.add('hidden');
            sessionsModal.classList.remove('flex');
        }

        sessionsBtn.addEventListener('click', openSessionsModal);
        newSessionBtn.addEventListener('click', startNewSession);

        chatForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const text = messageInput.value.trim();
            if (!text || isLoading) return;

            // Clear welcome message
            if (welcomeMessage && !welcomeMessage.classList.contains('hidden')) {
                welcomeMessage.classList.add('hidden');
            }

            // Add to history
            addToHistory(text);

            // Add user message
            messagesContainer.appendChild(createUserMessage(text));
            scrollToBottom();

            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // Set loading state
            isLoading = true;
            sendBtn.disabled = true;
            setStatus('思考中...', 'yellow');
            accumulatedText = '';

            // Add typing indicator
            const typingIndicator = createTypingIndicator();
            messagesContainer.appendChild(typingIndicator);
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        user_text: text
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                currentAssistantMessage = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        
                        try {
                            const data = JSON.parse(line.slice(6));
                            handleEvent(data);
                        } catch (err) {
                            console.error('Parse error:', err);
                        }
                    }
                }
            } catch (error) {
                console.error('Chat error:', error);
                setStatus('错误', 'red');
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                setStatus('就绪', 'emerald');
                removeTypingIndicator();
            }
        });

        function handleEvent(data) {
            removeTypingIndicator();
            setStatus('输出中...', 'blue');

            if (data.type === 'session_id') {
                sessionId = data.session_id;
                return;
            }

            if (!currentAssistantMessage) {
                currentAssistantMessage = createAssistantMessage();
                messagesContainer.appendChild(currentAssistantMessage);
            }

            const contentEl = currentAssistantMessage.querySelector('.assistant-content');

            if (data.type === 'text') {
                accumulatedText += data.text;
                contentEl.innerHTML = renderMarkdown(accumulatedText);
            } else if (data.type === 'thinking') {
                contentEl.innerHTML += `<span class="text-slate-500 italic">${escapeHtml(data.thinking)}</span>`;
            } else if (data.type === 'tool_use') {
                // Save tool use info for later result update
                pendingToolUses[data.tool_use_id] = {
                    tool_name: data.tool_name,
                    input: data.input
                };
                
                const collapseId = `tool-collapse-${++toolUseCounter}`;
                contentEl.innerHTML += createToolUseBlock(data.tool_name, data.input, data.tool_use_id, collapseId);
            } else if (data.type === 'tool_result') {
                const toolInfo = pendingToolUses[data.tool_use_id];
                
                if (toolInfo) {
                    updateToolResult(data.tool_use_id, toolInfo.tool_name, toolInfo.input, data.result, data.is_error);
                    delete pendingToolUses[data.tool_use_id];
                } else {
                    // Fallback: standalone result block
                    const lines = (data.result || '').split('\n').filter(l => l.trim());
                    const preview = lines.slice(0, 6).join('\n');
                    const hasMore = lines.length > 6;
                    contentEl.innerHTML += `
                        <div class="tool-block rounded-lg p-3 my-2 border-l-4 ${data.is_error ? 'border-red-500' : 'border-emerald-500'}">
                            <div class="text-sm font-medium ${data.is_error ? 'text-red-400' : 'text-emerald-400'} mb-1">
                                ${data.is_error ? '✗' : '●'} Result
                            </div>
                            <pre class="mono text-xs text-slate-300 bg-slate-900/50 rounded p-2 overflow-x-auto whitespace-pre-wrap">${escapeHtml(preview)}${hasMore ? '\n...' : ''}</pre>
                        </div>
                    `;
                }
            } else if (data.type === 'message_complete') {
                // Message complete - we could do something here
            } else if (data.type === 'error') {
                contentEl.innerHTML += `<div class="text-red-400 bg-red-900/30 border border-red-800 rounded-lg p-3 my-2">${escapeHtml(data.error)}</div>`;
            } else if (data.type === 'turn_complete') {
                currentAssistantMessage = null;
                accumulatedText = '';
                pendingToolUses = {};
                setStatus('就绪', 'emerald');
            }

            scrollToBottom();
        }

        // Close modal on escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeSessionsModal();
            }
        });
    </script>
</body>
</html>
