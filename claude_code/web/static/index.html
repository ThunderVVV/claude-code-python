<body class="gradient-bg min-h-screen text-slate-100">
    <div id="app"></div>

    <script>
    const { createApp, ref, computed, nextTick, onMounted, onBeforeUnmount, watch } = Vue;

    // Utility functions
    const escapeHtml = (text) => {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    };

    const WEB_REFERENCE_PATTERN = /(^|[\s])@web(?=$|[\s,;:!?()])/;

    const hasWebReference = (text) => WEB_REFERENCE_PATTERN.test(text || '');

    const highlightCode = (code, language) => {
        const hljs = window.hljs;
        if (!hljs) {
            return escapeHtml(code);
        }

        try {
            if (language && hljs.getLanguage(language)) {
                return hljs.highlight(code, { language }).value;
            }
            return hljs.highlightAuto(code).value;
        } catch (error) {
            console.warn('Markdown code highlight failed:', error);
            return escapeHtml(code);
        }
    };

    const renderMarkdown = (text) =>
        marked.parse(text || '', {
            langPrefix: 'hljs language-',
            highlight: highlightCode,
        });

    const isDiffContent = (content) =>
        content.includes('---') && content.includes('+++') ||
        content.includes('diff --git') ||
        (content.includes('-') && content.includes('+') && content.includes('@@'));

    const generateDiff = (oldContent, newContent, filePath) => {
        const normalizedPath = filePath || 'file';
        const patch = Diff.createTwoFilesPatch(
            `a/${normalizedPath}`,
            `b/${normalizedPath}`,
            oldContent,
            newContent,
            '',
            '',
            { context: Number.MAX_SAFE_INTEGER }
        );
        return `diff --git a/${normalizedPath} b/${normalizedPath}\n${patch}`;
    };

    // Main App
    const App = {
        template: `
            <div class="app-shell flex flex-col h-screen mx-auto p-4 md:p-6">
                <!-- Header -->
                <header class="flex items-center justify-between mb-4 fade-in">

                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                            </svg>
                        </div>
                        <div>
                            <h1 class="app-title text-xl font-semibold">Claude Code Python</h1>
                            <p class="app-subtitle text-xs">AI Programming Assistant</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span v-if="tokenUsed > 0" class="status-chip text-xs">
                            <span class="text-slate-500">Tokens:</span>
                            <span class="text-blue-400">{{ tokenUsed.toLocaleString() }}</span>
                            <span class="text-slate-600">/</span>
                            <span class="text-slate-500">128000</span>
                        </span>
                        <button @click="showSessionsModal = true" class="icon-button p-2 rounded-lg hover:bg-slate-700/50 transition-colors" title="会话列表">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                            </svg>
                        </button>
                        <button @click="startNewSession" class="icon-button p-2 rounded-lg hover:bg-slate-700/50 transition-colors" title="新会话">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                        </button>
                        <span class="status-chip flex items-center gap-2 text-sm">
                            <span :class="['status-dot w-2 h-2 rounded-full', statusColorClass]"></span>
                            {{ statusText }}
                        </span>
                    </div>
                </header>

                <!-- Chat Container -->
                <div class="editor-frame flex-1 overflow-hidden flex flex-col glass rounded-2xl shadow-2xl">
                    <!-- Messages Area -->
                    <div ref="messagesContainer" class="editor-scroll flex-1 overflow-y-auto p-4 md:p-6 space-y-4" @scroll="handleMessagesScroll">
                        <!-- Welcome Message -->
                        <div v-if="messages.length === 0" class="text-center py-12">
                            <div class="app-mark w-16 h-16 mx-auto mb-4 rounded-2xl flex items-center justify-center">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                                </svg>
                            </div>
                            <h2 class="text-lg font-medium text-white mb-2">开始对话</h2>
                            <p class="text-slate-400 text-sm max-w-md mx-auto">我可以帮你编写代码、调试问题、解释概念。有什么需要协助的吗？</p>
                        </div>

                        <!-- Messages -->
                        <message-item
                            v-for="(msg, index) in messages"
                            :key="index"
                            :message="msg"
                            @toggle-collapse="toggleCollapse"
                        />

                        <!-- Typing Indicator -->
                        <div v-if="isTyping" class="flex justify-start fade-in">
                            <div class="w-full">
                                <div class="flex items-start gap-3">
                                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-slate-600 to-slate-700 flex items-center justify-center flex-shrink-0">
                                        <svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                                        </svg>
                                    </div>
                                    <div class="message-assistant rounded-2xl rounded-tl-md px-4 py-3">
                                        <div class="typing-indicator flex gap-1.5">
                                            <span class="w-2 h-2 rounded-full bg-slate-400"></span>
                                            <span class="w-2 h-2 rounded-full bg-slate-400"></span>
                                            <span class="w-2 h-2 rounded-full bg-slate-400"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Input Area -->
                    <div class="composer-shell p-4 md:p-6 border-t border-slate-700/50 bg-slate-900/50">
                        <div v-if="currentInputHasWeb" class="mb-3 flex items-center gap-2 text-xs">
                            <span class="inline-flex items-center rounded-full border border-blue-400/40 bg-blue-500/10 px-2.5 py-1 font-medium text-blue-300">
                                @web 已启用
                            </span>
                            <span class="text-slate-400">本次请求将启用 Web 能力</span>
                        </div>
                        <form @submit.prevent="sendMessage" class="flex gap-3">
                            <div class="flex-1 relative">
                                <textarea
                                    ref="messageInput"
                                    v-model="inputText"
                                    rows="1"
                                    placeholder="输入消息... (Shift+Enter 换行, ↑↓ 历史)"
                                    class="composer-input w-full bg-slate-800/80 border border-slate-700 rounded-xl px-4 py-3 pr-12 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 input-glow resize-none transition-all duration-200"
                                    style="max-height: 200px;"
                                    @input="autoResize"
                                    @keydown="handleKeydown"
                                    :disabled="isStreaming"
                                ></textarea>
                            </div>
                            <button
                                v-if="!isStreaming"
                                type="submit"
                                :disabled="isLoading || !inputText.trim()"
                                class="action-button primary-action px-6 py-3 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-medium rounded-xl shadow-lg shadow-blue-500/30 transition-all duration-200 hover:shadow-blue-500/50 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100"
                            >
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                                </svg>
                            </button>
                            <button
                                v-else
                                type="button"
                                @click="sendInterrupt"
                                class="action-button danger-action px-6 py-3 bg-gradient-to-r from-red-500 to-orange-600 hover:from-red-600 hover:to-orange-700 text-white font-medium rounded-xl shadow-lg shadow-red-500/30 transition-all duration-200 hover:shadow-red-500/50 hover:scale-[1.02] active:scale-[0.98]"
                            >
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path>
                                </svg>
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Sessions Modal -->
                <div v-if="showSessionsModal" class="fixed inset-0 flex items-center justify-center z-50">
                    <div class="modal-overlay absolute inset-0" @click="showSessionsModal = false"></div>
                    <div class="relative glass rounded-2xl shadow-2xl w-full max-w-md mx-4 max-h-[80vh] overflow-hidden">
                        <div class="flex items-center justify-between p-4 border-b border-slate-700/50">
                            <h2 class="text-lg font-semibold text-white">会话列表</h2>
                            <button @click="showSessionsModal = false" class="p-1 rounded-lg hover:bg-slate-700/50">
                                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                </svg>
                            </button>
                        </div>
                        <div class="overflow-y-auto max-h-[60vh]">
                            <div v-if="sessionsLoading" class="p-4 text-center text-slate-400 text-sm">加载中...</div>
                            <div v-else-if="sessions.length === 0" class="p-4 text-center text-slate-400 text-sm">暂无会话</div>
                            <div v-else>
                                <div
                                    v-for="sess in sessions"
                                    :key="sess.session_id"
                                    class="session-item p-4 border-b border-slate-700/50 cursor-pointer transition-colors"
                                    @click="loadSession(sess.session_id)"
                                >
                                    <div class="flex items-center justify-between">
                                        <div class="flex-1 min-w-0">
                                            <h3 class="text-white font-medium truncate">{{ sess.title || 'Untitled' }}</h3>
                                            <p class="text-xs text-slate-500 mt-1">
                                                {{ sess.working_directory || '' }} • {{ sess.message_count || 0 }} 条消息
                                            </p>
                                        </div>
                                        <svg class="w-4 h-4 text-slate-500 flex-shrink-0 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                        </svg>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `,
        setup() {
            // State
            const messages = ref([]);
            const inputText = ref('');
            const isLoading = ref(false);
            const isStreaming = ref(false);
            const isTyping = ref(false);
            const sessionId = ref(null);
            const statusText = ref('就绪');
            const statusColor = ref('emerald');
            const tokenUsed = ref(0);
            const showSessionsModal = ref(false);
            const sessions = ref([]);
            const sessionsLoading = ref(false);
            const autoFollowOutput = ref(true);

            // Input history
            const inputHistory = ref(JSON.parse(localStorage.getItem('inputHistory') || '[]'));
            const navItems = ref([]);
            const historyIndex = ref(0);

            // Current streaming state
            const currentAssistantMessage = ref(null);
            const accumulatedText = ref('');
            const pendingToolUses = ref({});
            const toolUseCounter = ref(0);

            // For aborting fetch request
            const abortController = ref(null);

            // Refs
            const messagesContainer = ref(null);
            const messageInput = ref(null);

            // Computed
            const statusColorClass = computed(() => `bg-${statusColor.value}-500`);
            const currentInputHasWeb = computed(() => hasWebReference(inputText.value));

            // Methods
            const isNearBottom = () => {
                if (!messagesContainer.value) return true;
                const { scrollHeight, scrollTop, clientHeight } = messagesContainer.value;
                return scrollHeight - scrollTop - clientHeight <= 24;
            };

            const updateAutoFollowState = () => {
                autoFollowOutput.value = isNearBottom();
            };

            const scrollToBottom = (force = false) => {
                nextTick(() => {
                    if (messagesContainer.value && (force || autoFollowOutput.value)) {
                        messagesContainer.value.scrollTop = messagesContainer.value.scrollHeight;
                        autoFollowOutput.value = true;
                    }
                });
            };

            const handleMessagesScroll = () => {
                updateAutoFollowState();
            };

            const autoResize = (e) => {
                e.target.style.height = 'auto';
                e.target.style.height = Math.min(e.target.scrollHeight, 200) + 'px';
            };

            const resetHistoryNavigation = () => {
                navItems.value = [...inputHistory.value, ''];
                historyIndex.value = navItems.value.length - 1;
            };

            const navigateHistory = (direction) => {
                if (navItems.value.length === 0) return;

                navItems.value[historyIndex.value] = inputText.value;

                historyIndex.value += direction;
                historyIndex.value = Math.max(0, Math.min(historyIndex.value, navItems.value.length - 1));

                inputText.value = navItems.value[historyIndex.value] || '';
                nextTick(() => autoResize({ target: messageInput.value }));
            };

            const handleKeydown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                } else if (e.key === 'Escape' && isStreaming.value) {
                    e.preventDefault();
                    sendInterrupt();
                } else if (e.key === 'ArrowUp' && !e.shiftKey) {
                    e.preventDefault();
                    navigateHistory(-1);
                } else if (e.key === 'ArrowDown' && !e.shiftKey) {
                    e.preventDefault();
                    navigateHistory(1);
                }
            };

            const addToHistory = (text) => {
                if (text.trim() && (inputHistory.value.length === 0 || inputHistory.value[inputHistory.value.length - 1] !== text)) {
                    inputHistory.value.push(text);
                    if (inputHistory.value.length > 1000) inputHistory.value.shift();
                    localStorage.setItem('inputHistory', JSON.stringify(inputHistory.value));
                }
                resetHistoryNavigation();
            };

            resetHistoryNavigation();

            const summarizeToolUse = (toolName, toolInput) => {
                if (!toolInput) return toolName;
                if (toolInput.command) {
                    const cmd = toolInput.command;
                    return `${toolName}: ${cmd.length > 50 ? cmd.substring(0, 47) + '...' : cmd}`;
                }
                if (toolInput.file_path) {
                    const path = toolInput.file_path;
                    const name = path.split('/').pop() || path;
                    return `${toolName}: ${name}`;
                }
                if (toolInput.pattern) {
                    const pat = toolInput.pattern;
                    return `${toolName}: ${pat.length > 50 ? pat.substring(0, 47) + '...' : pat}`;
                }
                const keys = Object.keys(toolInput);
                if (keys.length > 0) {
                    const preview = keys.slice(0, 3).join(', ');
                    return `${toolName}: ${preview}${keys.length > 3 ? ', ...' : ''}`;
                }
                return toolName;
            };

            const summarizeToolResult = (toolName, toolInput, result, isError) => {
                const lines = (result || '').split('\n').filter(l => l.trim());
                const firstLine = lines[0] || '';

                const getBasename = () => (toolInput?.file_path || '').split('/').pop() || 'file';
                const getPattern = () => toolInput?.pattern ? `'${toolInput.pattern}'` : '';

                if (isError) {
                    if (toolName === 'Bash') {
                        const cmd = toolInput?.command || '';
                        return `Failed to run ${cmd.length > 40 ? cmd.substring(0, 37) + '...' : cmd}`;
                    }
                    if (['Read', 'Write', 'Edit'].includes(toolName)) return `Failed to ${toolName.toLowerCase()} ${getBasename()}`;
                    if (['Glob', 'Grep'].includes(toolName)) return `Failed to search ${getPattern()}`;
                    return `Failed to run ${toolName}`;
                }

                if (toolName === 'Read') {
                    const match = result?.match(/Lines:\s*(\d+)-(\d+)\s+of\s+(\d+)/);
                    if (match) {
                        const [, start, end, total] = match;
                        const count = parseInt(end) - parseInt(start) + 1;
                        return `Read ${count} line${count > 1 ? 's' : ''} from ${getBasename()} (${start}-${end} of ${total})`;
                    }
                    return `Read ${getBasename()}`;
                }

                if (toolName === 'Glob') {
                    const pat = getPattern();
                    if (firstLine.includes('No files found')) return `Glob found no files matching ${pat}`;
                    if (firstLine.startsWith('Found ')) return `Glob ${firstLine.charAt(0).toLowerCase()}${firstLine.slice(1)}`;
                    return `Glob results matching ${pat}`;
                }

                if (toolName === 'Grep') {
                    const pat = getPattern();
                    if (firstLine === 'No matches found' || firstLine === 'No files found') return `Grep found no matches for ${pat}`;
                    if (firstLine.startsWith('Found ')) return `Grep ${firstLine.charAt(0).toLowerCase()}${firstLine.slice(1)}${pat ? ` matching ${pat}` : ''}`;
                    return `Grep matches for ${pat}`;
                }

                if (toolName === 'Write' || toolName === 'Edit') return firstLine || `${toolName} completed`;
                if (toolName === 'Bash') {
                    const cmd = toolInput?.command || '';
                    return `Ran: ${cmd.length > 40 ? cmd.substring(0, 37) + '...' : cmd}`;
                }

                return firstLine || `${toolName} completed`;
            };

            const isFileEditTool = (toolName) => ['edit', 'write'].includes((toolName || '').toLowerCase());

            const createToolBlock = (toolName, toolInput, toolUseId, collapseId) => {
                const summary = summarizeToolUse(toolName, toolInput);
                const shouldExpand = isFileEditTool(toolName);

                let inputDetails = '';
                const excludeKeys = isFileEditTool(toolName) ?
                    (toolName.toLowerCase() === 'edit' ? ['old_string', 'new_string'] : ['content']) : [];

                for (const [key, value] of Object.entries(toolInput || {})) {
                    if (excludeKeys.includes(key)) continue;
                    let displayValue = typeof value === 'object' ? JSON.stringify(value, null, 2) : String(value);
                    if (displayValue.length > 100) displayValue = displayValue.substring(0, 97) + '...';
                    inputDetails += `<div class="text-xs text-slate-400"><span class="text-slate-500">${escapeHtml(key)}:</span> ${escapeHtml(displayValue.split('\n')[0])}</div>`;
                }

                return {
                    type: 'tool_block',
                    toolName,
                    toolInput,
                    toolUseId,
                    collapseId,
                    summary,
                    expanded: shouldExpand,
                    inputDetails,
                    result: null,
                    isError: false,
                    diffData: null
                };
            };

            const generateDiffData = (toolName, toolInput, result) => {
                const normalizedToolName = (toolName || '').toLowerCase();

                if (normalizedToolName === 'edit') {
                    const oldString = toolInput.old_string || '';
                    const newString = toolInput.new_string || '';
                    const filePath = toolInput.file_path || 'file';

                    if (oldString && newString) {
                        return generateDiff(oldString, newString, filePath);
                    }
                } else if (normalizedToolName === 'write') {
                    const content = toolInput.content || '';
                    const filePath = toolInput.file_path || 'file';

                    if (content) {
                        return generateDiff('', content, filePath);
                    }
                }
                return null;
            };

            const createUserMessage = (text, options = {}) => ({
                type: 'user',
                text,
                originalText: options.originalText || text,
                fileExpansions: options.fileExpansions || [],
                webEnabled: options.webEnabled ?? hasWebReference(options.originalText || text)
            });

            const applyServerUserMessage = (message) => {
                const originalText = message.original_text || '';
                const updatedMessage = createUserMessage(originalText, {
                    originalText,
                    fileExpansions: message.file_expansions || [],
                    webEnabled: Boolean(message.web_enabled)
                });

                const lastMessage = messages.value[messages.value.length - 1];
                if (lastMessage?.type === 'user') {
                    messages.value[messages.value.length - 1] = updatedMessage;
                } else {
                    messages.value.push(updatedMessage);
                }
            };

            const getSelectedText = () => {
                const activeElement = document.activeElement;
                if (
                    activeElement &&
                    typeof activeElement.selectionStart === 'number' &&
                    typeof activeElement.selectionEnd === 'number' &&
                    typeof activeElement.value === 'string'
                ) {
                    const { selectionStart, selectionEnd, value } = activeElement;
                    if (selectionStart !== selectionEnd) {
                        return value.slice(selectionStart, selectionEnd);
                    }
                }
                return window.getSelection()?.toString() || '';
            };

            const flashStatus = (text, color = 'emerald') => {
                statusText.value = text;
                statusColor.value = color;
                setTimeout(() => {
                    if (!isStreaming.value) {
                        statusText.value = '就绪';
                        statusColor.value = 'emerald';
                    }
                }, 1000);
            };

            const copySelectedText = async (e) => {
                const selectedText = getSelectedText();
                if (!selectedText) return false;
                if (!navigator.clipboard?.writeText) return false;

                try {
                    e.preventDefault();
                    await navigator.clipboard.writeText(selectedText);
                    flashStatus('已复制');
                    return true;
                } catch (error) {
                    console.error('Copy failed:', error);
                    return false;
                }
            };

            const handleGlobalKeydown = async (e) => {
                const key = e.key.toLowerCase();
                const isCopyShortcut = (e.metaKey || e.ctrlKey) && key === 'c' && !e.altKey;

                if (isCopyShortcut) {
                    await copySelectedText(e);
                    return;
                }

                if (e.key === 'Escape') {
                    if (showSessionsModal.value) {
                        showSessionsModal.value = false;
                    } else if (isStreaming.value) {
                        e.preventDefault();
                        sendInterrupt();
                    }
                }
            };

            const handleEvent = (data) => {
                if (data.type === 'session_id') {
                    sessionId.value = data.session_id;
                    return;
                }

                if (data.type === 'message_complete') {
                    if (data.message?.role === 'user') {
                        applyServerUserMessage(data.message);
                    }
                    scrollToBottom();
                    return;
                }

                if (data.type === 'turn_complete') {
                    currentAssistantMessage.value = null;
                    accumulatedText.value = '';
                    pendingToolUses.value = {};
                    statusText.value = '就绪';
                    statusColor.value = 'emerald';
                    scrollToBottom();
                    return;
                }

                isTyping.value = false;
                statusText.value = '输出中...';
                statusColor.value = 'blue';

                if (!currentAssistantMessage.value) {
                    currentAssistantMessage.value = {
                        type: 'assistant',
                        content: []
                    };
                    messages.value.push(currentAssistantMessage.value);
                }

                const content = currentAssistantMessage.value.content;

                if (data.type === 'text') {
                    accumulatedText.value += data.text;
                    // Find or create text block
                    let textBlock = content.find(b => b.type === 'text');
                    if (!textBlock) {
                        textBlock = { type: 'text', text: '' };
                        content.push(textBlock);
                    }
                    textBlock.text = accumulatedText.value;
                } else if (data.type === 'thinking') {
                    content.push({ type: 'thinking', thinking: data.thinking });
                } else if (data.type === 'tool_use') {
                    // Check if tool block already exists
                    const existingBlock = content.find(b => b.type === 'tool_block' && b.toolUseId === data.tool_use_id);
                    
                    // Always save to pendingToolUses for later result update (input might be more complete)
                    pendingToolUses.value[data.tool_use_id] = {
                        tool_name: data.tool_name,
                        input: data.input
                    };
                    
                    if (!existingBlock) {
                        const collapseId = `tool-collapse-${++toolUseCounter.value}`;
                        const toolBlock = createToolBlock(data.tool_name, data.input, data.tool_use_id, collapseId);
                        content.push(toolBlock);
                    }
                } else if (data.type === 'tool_result') {
                    const toolInfo = pendingToolUses.value[data.tool_use_id];
                    const toolName = toolInfo?.tool_name || data.tool_name;
                    const toolInput = toolInfo?.input || {};

                    // Find and update the tool block
                    const toolBlock = content.find(b => b.type === 'tool_block' && b.toolUseId === data.tool_use_id);
                    if (toolBlock) {
                        toolBlock.result = data.result;
                        toolBlock.isError = data.is_error;
                        toolBlock.summary = summarizeToolResult(toolName, toolInput, data.result, data.is_error);

                        if (isFileEditTool(toolName) && !data.is_error) {
                            toolBlock.diffData = generateDiffData(toolName, toolInput, data.result);
                        }
                    }

                    if (toolInfo) delete pendingToolUses.value[data.tool_use_id];
                } else if (data.type === 'error') {
                    content.push({
                        type: 'error',
                        error: data.error
                    });
                }

                scrollToBottom();
            };

            const sendMessage = async () => {
                const text = inputText.value.trim();
                if (!text || isLoading.value) return;

                addToHistory(text);

                // Add user message
                messages.value.push(createUserMessage(text));

                inputText.value = '';
                if (messageInput.value) {
                    messageInput.value.style.height = 'auto';
                }

                isLoading.value = true;
                isStreaming.value = true;
                isTyping.value = true;
                statusText.value = '思考中...';
                statusColor.value = 'yellow';
                accumulatedText.value = '';

                // Create AbortController for this request
                abortController.value = new AbortController();

                autoFollowOutput.value = true;
                scrollToBottom(true);

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            session_id: sessionId.value,
                            user_text: text
                        }),
                        signal: abortController.value.signal
                    });

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n\n');
                        buffer = lines.pop() || '';

                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue;
                            try {
                                const data = JSON.parse(line.slice(6));
                                handleEvent(data);
                            } catch (err) {
                                console.error('Parse error:', err);
                            }
                        }
                    }
                } catch (error) {
                    if (error.name === 'AbortError') {
                        console.log('Request aborted by user');
                        statusText.value = '已中断';
                        statusColor.value = 'orange';
                    } else {
                        console.error('Chat error:', error);
                        statusText.value = '错误';
                        statusColor.value = 'red';
                    }
                } finally {
                    isLoading.value = false;
                    isStreaming.value = false;
                    isTyping.value = false;
                    abortController.value = null;
                    setTimeout(() => {
                        statusText.value = '就绪';
                        statusColor.value = 'emerald';
                    }, 1000);
                }
            };

            const sendInterrupt = async () => {
                if (!abortController.value) return;

                try {
                    // First abort the fetch request
                    abortController.value.abort();

                    // Then send interrupt to backend when a session already exists
                    if (sessionId.value) {
                        await fetch('/api/interrupt', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                session_id: sessionId.value,
                                reason: 'user_interrupt'
                            })
                        });
                    }

                    // Reset streaming state
                    currentAssistantMessage.value = null;
                    accumulatedText.value = '';
                    pendingToolUses.value = {};
                } catch (error) {
                    console.error('Interrupt error:', error);
                }
            };

            const startNewSession = () => {
                messages.value = [];
                sessionId.value = null;
                accumulatedText.value = '';
                statusText.value = '就绪';
                statusColor.value = 'emerald';
                autoFollowOutput.value = true;
            };

            const loadSessions = async () => {
                sessionsLoading.value = true;
                try {
                    const response = await fetch('/api/sessions');
                    const data = await response.json();
                    sessions.value = data.sessions || [];
                } catch (error) {
                    console.error('Failed to load sessions:', error);
                } finally {
                    sessionsLoading.value = false;
                }
            };

            const loadSession = async (sid) => {
                showSessionsModal.value = false;
                messages.value = [];
                sessionId.value = null;

                try {
                    const response = await fetch(`/api/sessions/${sid}`);
                    const data = await response.json();

                    if (data.error) {
                        alert('加载会话失败: ' + data.error);
                        return;
                    }

                    sessionId.value = sid;

                    if (data.messages && data.messages.length > 0) {
                        let lastAssistantMsg = null;
                        const sessionToolUses = {};

                        for (const msg of data.messages) {
                            if (msg.role === 'user') {
                                const fileExpansions = msg.file_expansions || [];
                                const originalText = msg.original_text || '';
                                let displayText = '';

                                if (msg.content_blocks) {
                                    for (const block of msg.content_blocks) {
                                        if (block.type === 'text') {
                                            displayText = block.text;
                                            break;
                                        }
                                    }
                                } else {
                                    displayText = msg.content || '';
                                }

                                messages.value.push({
                                    ...createUserMessage(originalText || displayText, {
                                        originalText: originalText || displayText,
                                        fileExpansions,
                                        webEnabled: Boolean(msg.web_enabled)
                                    })
                                });
                                lastAssistantMsg = null;
                                Object.keys(sessionToolUses).forEach(key => delete sessionToolUses[key]);
                            } else if (msg.role === 'assistant') {
                                const assistantMsg = {
                                    type: 'assistant',
                                    content: []
                                };

                                if (msg.content_blocks && msg.content_blocks.length > 0) {
                                    for (const block of msg.content_blocks) {
                                        if (block.type === 'text') {
                                            assistantMsg.content.push({ type: 'text', text: block.text });
                                        } else if (block.type === 'thinking') {
                                            assistantMsg.content.push({ type: 'thinking', thinking: block.thinking });
                                        } else if (block.type === 'tool_use') {
                                            const existingBlock = assistantMsg.content.find(
                                                b => b.type === 'tool_block' && b.toolUseId === block.tool_use_id
                                            );
                                            
                                            sessionToolUses[block.tool_use_id] = {
                                                tool_name: block.tool_name,
                                                input: block.input
                                            };
                                            
                                            if (!existingBlock) {
                                                const collapseId = `tool-collapse-${++toolUseCounter.value}`;
                                                const toolBlock = createToolBlock(block.tool_name, block.input, block.tool_use_id, collapseId);
                                                assistantMsg.content.push(toolBlock);
                                            }
                                        } else if (block.type === 'tool_result') {
                                            const toolInfo = sessionToolUses[block.tool_use_id];
                                            const toolName = toolInfo?.tool_name;
                                            const toolInput = toolInfo?.input || {};

                                            const toolBlock = assistantMsg.content.find(
                                                b => b.type === 'tool_block' && b.toolUseId === block.tool_use_id
                                            );
                                            if (toolBlock) {
                                                toolBlock.result = block.result;
                                                toolBlock.isError = block.is_error;
                                                toolBlock.summary = summarizeToolResult(toolName, toolInput, block.result, block.is_error);
                                                if (isFileEditTool(toolName) && !block.is_error) {
                                                    toolBlock.diffData = generateDiffData(toolName, toolInput, block.result);
                                                }
                                            }
                                            if (toolInfo) delete sessionToolUses[block.tool_use_id];
                                        }
                                    }
                                }

                                messages.value.push(assistantMsg);
                                lastAssistantMsg = assistantMsg;
                            } else if (msg.role === 'tool') {
                                if (msg.content_blocks) {
                                    for (const block of msg.content_blocks) {
                                        if (block.type === 'tool_result') {
                                            let targetMsg = lastAssistantMsg;
                                            
                                            if (!targetMsg) {
                                                targetMsg = {
                                                    type: 'assistant',
                                                    content: []
                                                };
                                                messages.value.push(targetMsg);
                                                lastAssistantMsg = targetMsg;
                                            }
                                            
                                            const toolInfo = sessionToolUses[block.tool_use_id];
                                            const toolName = toolInfo?.tool_name;
                                            const toolInput = toolInfo?.input || {};
                                            
                                            const toolBlock = targetMsg.content.find(
                                                b => b.type === 'tool_block' && b.toolUseId === block.tool_use_id
                                            );
											
                                            if (toolBlock) {
                                                toolBlock.result = block.result;
                                                toolBlock.isError = block.is_error;
                                                toolBlock.summary = summarizeToolResult(toolName, toolInput, block.result, block.is_error);
                                                if (isFileEditTool(toolName) && !block.is_error) {
                                                    toolBlock.diffData = generateDiffData(toolName, toolInput, block.result);
                                                }
                                            }
                                            if (toolInfo) delete sessionToolUses[block.tool_use_id];
                                        }
                                    }
                                }
                            }
                        }
                        autoFollowOutput.value = true;
                        scrollToBottom(true);
                    }

                    if (data.total_usage) {
                        tokenUsed.value = data.total_usage.input_tokens + data.total_usage.output_tokens;
                    }
                } catch (error) {
                    console.error('Failed to load session:', error);
                    alert('加载会话失败: ' + error.message);
                }
            };

            const toggleCollapse = (collapseId) => {
                // Find and toggle the collapsed state
                for (const msg of messages.value) {
                    if (msg.content) {
                        for (const block of msg.content) {
                            if (block.type === 'tool_block' && block.collapseId === collapseId) {
                                block.expanded = !block.expanded;
                                return;
                            }
                        }
                    }
                }
            };

            // Watch for modal open
            watch(showSessionsModal, (val) => {
                if (val) loadSessions();
            });

            // Keyboard shortcuts
            onMounted(() => {
                document.addEventListener('keydown', handleGlobalKeydown);
            });

            onBeforeUnmount(() => {
                document.removeEventListener('keydown', handleGlobalKeydown);
            });

            return {
                messages,
                inputText,
                isLoading,
                isStreaming,
                isTyping,
                statusText,
                statusColor,
                statusColorClass,
                tokenUsed,
                showSessionsModal,
                sessions,
                sessionsLoading,
                currentInputHasWeb,
                messagesContainer,
                messageInput,
                autoResize,
                handleMessagesScroll,
                handleKeydown,
                sendMessage,
                sendInterrupt,
                startNewSession,
                loadSession,
                toggleCollapse,
                scrollToBottom
            };
        }
    };

    // Message Item Component
    const MessageItem = {
        name: 'MessageItem',
        props: ['message'],
        emits: ['toggle-collapse'],
        template: `
            <div v-if="message.type === 'user'" class="flex justify-end fade-in">
                <div class="max-w-[90%]">
                    <div v-if="message.webEnabled" class="mb-2 flex justify-end">
                        <span class="inline-flex items-center rounded-full border border-blue-400/40 bg-blue-500/10 px-2.5 py-1 text-xs font-medium text-blue-300">
                            @web 已启用
                        </span>
                    </div>
                    <div v-for="(exp, idx) in message.fileExpansions" :key="idx" class="file-expansion rounded-lg p-3 mb-2">
                        <div class="text-sm text-blue-300 font-medium mb-1">@{{ exp.display_path || exp.file_path }}</div>
                        <pre class="mono text-xs text-slate-400 bg-slate-900/50 rounded p-2 overflow-x-auto max-h-32 overflow-y-auto">{{ exp.content.substring(0, 500) }}{{ exp.content.length > 500 ? '\\n... (more lines)' : '' }}</pre>
                    </div>
                    <div class="message-user rounded-2xl rounded-tr-md px-4 py-3 shadow-lg">
                        <p class="text-white whitespace-pre-wrap">{{ message.text }}</p>
                    </div>
                </div>
            </div>

            <div v-else-if="message.type === 'assistant'" class="flex justify-start fade-in">
                <div class="w-full">
                    <div class="flex items-start gap-3">
                        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-slate-600 to-slate-700 flex items-center justify-center flex-shrink-0">
                            <svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                        <div class="flex-1 message-assistant rounded-2xl rounded-tl-md px-4 py-3 min-w-0">
                            <div class="assistant-content markdown-body">
                                <template v-for="(block, idx) in message.content" :key="idx">
                                    <div v-if="block.type === 'text'" class="text-container" v-html="renderMarkdown(block.text)"></div>
                                    <span v-else-if="block.type === 'thinking'" class="text-slate-500 italic thinking-block">{{ block.thinking }}</span>
                                    <div v-else-if="block.type === 'tool_block'" class="tool-block rounded-lg p-3 my-2 border-l-4" :class="block.isError ? 'border-red-500' : (block.result ? 'border-emerald-500' : 'border-blue-500')">
                                        <div class="collapsible-header flex items-center justify-between rounded -m-3 p-3" @click="$emit('toggle-collapse', block.collapseId)">
                                            <div class="text-sm font-medium tool-summary" :class="block.isError ? 'text-red-400' : (block.result ? 'text-emerald-400' : 'text-blue-400')">
                                                {{ block.result ? (block.isError ? '✗ ' : '● ') + block.summary : block.summary }}
                                            </div>
                                            <svg class="w-4 h-4 text-slate-400 collapse-icon" :class="{ rotated: block.expanded }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                            </svg>
                                        </div>
                                        <div :id="block.collapseId" class="collapsible-content" :class="{ expanded: block.expanded }">
                                            <div class="mt-2">
                                                <div v-html="block.inputDetails"></div>
                                                <div v-if="block.result" class="tool-result-area mt-2">
                                                    <div v-if="block.diffData" :id="'diff-' + block.collapseId" class="diff-container"></div>
                                                    <pre v-else class="mono text-xs text-slate-300 bg-slate-900/50 rounded p-2 overflow-x-auto whitespace-pre-wrap">{{ resultPreview(block.result) }}</pre>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div v-else-if="block.type === 'error'" class="text-red-400 bg-red-900/30 border border-red-800 rounded-lg p-3 my-2">
                                        {{ block.error }}
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `,
        setup(props) {
            const resultPreview = (result) => {
                const lines = (result || '').split('\n').filter(l => l.trim());
                const preview = lines.slice(0, 6).join('\n');
                return preview + (lines.length > 6 ? '\n...' : '');
            };

            // Render diff after DOM update
            const renderDiffBlock = () => {
                nextTick(() => {
                    if (props.message.type === 'assistant' && props.message.content) {
                        for (const block of props.message.content) {
                            if (block.type === 'tool_block' && block.diffData && block.expanded) {
                                const container = document.getElementById('diff-' + block.collapseId);
                                if (container && !container.hasChildNodes()) {
                                    try {
                                        const diff2htmlUi = new Diff2HtmlUI(container, block.diffData, {
                                            drawFileList: false,
                                            matching: 'lines',
                                            outputFormat: 'side-by-side',
                                            highlight: true,
                                            synchronisedScroll: true,
                                            colorScheme: 'dark'
                                        });
                                        diff2htmlUi.draw();
                                        diff2htmlUi.highlightCode();
                                    } catch (e) {
                                        console.error('Diff render error:', e);
                                    }
                                }
                            }
                        }
                    }
                });
            };

            // Watch for changes
            watch(() => props.message, renderDiffBlock, { deep: true, immediate: true });

            return { renderMarkdown, resultPreview };
        }
    };

    // Create app
    const app = createApp(App);
    app.component('MessageItem', MessageItem);
    app.mount('#app');
    </script>
</body>
</html>
